---
- name: Install dependencies on Ubuntu
  apt:
    name:
      - build-essential
      - libgd-dev
      - libssl-dev
      - libapache2-mod-php
      - php
      - gzip
      - wget
      - unzip
      - curl
    state: latest
    update_cache: yes
  when: ansible_distribution == "Ubuntu"

- name: Install dependencies on CentOS
  dnf:
    name:
      - gcc
      - glibc
      - glibc-common
      - gd
      - gd-devel
      - openssl-devel
      - php
      - httpd
      - gzip
      - wget
      - unzip
      - curl
    state: latest
    update_cache: yes
  when: ansible_distribution == "CentOS"

- name: Create nagios user
  user:
    name: "{{ nagios_user }}"
    shell: /bin/bash
    createhome: no
    state: present

- name: Create nagios group
  group:
    name: "{{ nagios_group }}"
    state: present

- name: Add nagios user to nagios group
  user:
    name: "{{ nagios_user }}"
    groups: "{{ nagios_group }}"
    append: yes

- name: Add www-data to nagios group (Ubuntu)
  user:
    name: www-data
    groups: "{{ nagios_group }}"
    append: yes
  when: ansible_distribution == "Ubuntu"

- name: Add apache to nagios group (CentOS)
  user:
    name: apache
    groups: "{{ nagios_group }}"
    append: yes
  when: ansible_distribution == "CentOS"

- name: Download Nagios Core
  shell: |
    cd /tmp
    wget https://assets.nagios.com/downloads/nagioscore/releases/nagios-{{ nagios_version }}.tar.gz
  register: nagios_download

- name: Extract Nagios Core
  unarchive:
    src: "/tmp/nagios-{{ nagios_version }}.tar.gz"
    dest: /tmp
    remote_src: yes
  when: nagios_download.changed

- name: Configure Nagios
  shell: |
    cd /tmp/nagios-{{ nagios_version }}
    ./configure --with-command-group=nagcmd
  register: nagios_configure

- name: Compile Nagios
  shell: |
    cd /tmp/nagios-{{ nagios_version }}
    make all
  when: nagios_configure.changed

- name: Create nagcmd group
  group:
    name: nagcmd
    state: present

- name: Add users to nagcmd group
  user:
    name: "{{ item }}"
    groups: nagcmd
    append: yes
  loop:
    - "{{ nagios_user }}"
    - www-data
  when: ansible_distribution == "Ubuntu"

- name: Add users to nagcmd group (CentOS)
  user:
    name: "{{ item }}"
    groups: nagcmd
    append: yes
  loop:
    - "{{ nagios_user }}"
    - apache
  when: ansible_distribution == "CentOS"

- name: Install Nagios
  shell: |
    cd /tmp/nagios-{{ nagios_version }}
    make install
    make install-init
    make install-daemoninit
    make install-commandmode
    make install-config
    make install-webconf
  register: nagios_install

- name: Create nagios.cgi htpasswd entry
  shell: |
    htpasswd -cb /usr/local/nagios/etc/htpasswd.users nagiosadmin admin123
  when: nagios_install.changed

- name: Start Apache on Ubuntu
  service:
    name: "{{ apache_service_ubuntu }}"
    state: started
    enabled: yes
  when: ansible_distribution == "Ubuntu"

- name: Start Apache on CentOS/RHEL
  service:
    name: "{{ apache_service_centos }}"
    state: started
    enabled: yes
  when: ansible_distribution == "CentOS"

- name: Enable Apache modules on Ubuntu
  apache2_module:
    name: "{{ item }}"
    state: present
  loop:
    - cgi
    - rewrite
  when: ansible_distribution == "Ubuntu"
  notify: restart apache ubuntu

- name: Start and enable Nagios service
  service:
    name: nagios
    state: started
    enabled: yes

- name: Verify Nagios installation
  uri:
    url: "http://localhost/nagios"
    status_code: 401
  register: nagios_check
  retries: 3
  delay: 5

- name: Display Nagios access information
  debug:
    msg: "Nagios installed successfully! Access it at http://{{ ansible_default_ipv4.address }}/nagios with user: nagiosadmin and password: admin123"
  when: nagios_check.status == 401
