---
- name: Install Nagios Pre-Requisites on Ubuntu
  apt:
    name:
      - apache2
      - php
      - php-gd
      - libapache2-mod-php
      - unzip
      - wget
      - build-essential
      - nagios-plugins
    state: present
    update_cache: yes
  when: ansible_distribution == "Ubuntu"

- name: Enable Apache service
  service:
    name: apache2
    state: started
    enabled: yes
  when: ansible_distribution == "Ubuntu"

- name: Enable Apache modules needed for Nagios
  command: a2enmod rewrite
  when: ansible_distribution == "Ubuntu"

- name: Restart Apache service
  service:
    name: apache2
    state: restarted
  when: ansible_distribution == "Ubuntu"

- name: Install Nagios on Ubuntu
  apt:
    name: nagios4
    state: present
    update_cache: yes
  when: ansible_distribution == "Ubuntu"

- name: Start Nagios Service on Ubuntu
  service:
    name: nagios4
    state: started
    enabled: yes
  when: ansible_distribution == "Ubuntu"
